 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTCODE PROVIDER - STATION ONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans flex flex-col items-center min-h-screen">
    <div class="w-full max-w-md mt-10">
        <h1 class="text-[#ccff00] text-3xl font-black italic tracking-tighter uppercase mb-2 text-center">Station One</h1>
        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.4em] mb-8 text-center">Secure Provider Link</p>

        <div class="bg-zinc-900 border-2 border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl">
            <label class="text-[10px] text-blue-400 font-black uppercase tracking-widest block mb-4 italic text-center">Instruction for Patient:</label>
            
            <input type="text" id="noteInput" 
                class="w-full bg-black border-2 border-zinc-800 rounded-2xl p-5 text-xl text-[#ccff00] font-black outline-none focus:border-[#ccff00] mb-6 uppercase text-center shadow-inner" 
                placeholder="Ex: LOSARTAN 50MG">

            <button onclick="transmitNote()" id="sendBtn" 
                class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-sm active:scale-95 shadow-lg hover:bg-blue-500">
                Push to Patient
            </button>

            <div id="status-box" class="mt-6 text-center">
                <p id="status-text" class="text-zinc-700 font-bold text-[9px] uppercase tracking-widest italic transition-all">Link: Standby</p>
            </div>
        </div>
    </div>

    <script>
        async function transmitNote() {
            const val = document.getElementById('noteInput').value;
            if(!val) return;
            
            const status = document.getElementById('status-text');
            const btn = document.getElementById('sendBtn');
            
            status.innerText = "TRANSMITTING...";
            status.className = "text-yellow-500 font-bold text-[9px] animate-pulse uppercase tracking-widest italic";
            btn.disabled = true;

            try {
                // APUNTANDO AL NUEVO ARCHIVO api/relay.js
                const response = await fetch('/api/relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });

                if (response.ok) {
                    status.innerText = "SENT SUCCESSFUL ✅";
                    status.className = "text-[#ccff00] font-bold text-[9px] uppercase tracking-widest italic";
                    document.getElementById('noteInput').value = "";
                    
                    // Resetear mensaje de estado después de 3 segundos
                    setTimeout(() => {
                        if(status.innerText === "SENT SUCCESSFUL ✅") {
                            status.innerText = "Link: Standby";
                            status.className = "text-zinc-700 font-bold text-[9px] uppercase tracking-widest italic";
                        }
                    }, 3000);
                } else { 
                    const errorMsg = await response.text();
                    console.error("Relay error:", errorMsg);
                    throw new Error(); 
                }
            } catch (e) {
                status.innerText = "CONNECTION ERROR ❌";
                status.className = "text-red-500 font-bold text-[9px] uppercase tracking-widest italic";
            } finally { 
                btn.disabled = false; 
            }
        }

        // Enviar con la tecla Enter
        document.getElementById('noteInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                transmitNote();
            }
        });
    </script>
</body>
</html>
