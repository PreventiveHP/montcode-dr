<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTCODE DR - STATION ONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-black text-white p-4 font-sans min-h-screen">
    <div class="text-center mb-6">
        <h1 class="text-[#ccff00] text-2xl font-black italic uppercase tracking-tighter">MontCode™ <span class="text-white">DR</span></h1>
        <p class="text-zinc-500 text-[8px] font-bold uppercase tracking-[0.4em]">Clinical Control Terminal</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <div class="lg:col-span-3 bg-zinc-900 border-2 border-zinc-800 p-4 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4">
                <p class="text-[9px] text-blue-400 font-black uppercase italic">Patient Directory</p>
                <button onclick="addPatient()" class="bg-zinc-800 text-[#ccff00] px-2 rounded-lg">+</button>
            </div>
            <div id="p-list" class="space-y-2"></div>
        </div>

        <div class="lg:col-span-9 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-3xl h-48">
                    <p class="text-[8px] text-[#ccff00] font-black uppercase mb-2">Glucose History</p>
                    <canvas id="gluChart"></canvas>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-3xl h-48">
                    <p class="text-[8px] text-red-500 font-black uppercase mb-2">BP Hemodynamics</p>
                    <canvas id="bpChart"></canvas>
                </div>
            </div>

            <div class="bg-blue-900/10 border-2 border-blue-600/30 p-6 rounded-[2.5rem]">
                <p class="text-[9px] text-blue-400 font-black uppercase text-center mb-4 italic">Direct Instruction Push</p>
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" id="mInput" 
                        class="flex-grow bg-black border-2 border-zinc-800 rounded-2xl p-4 text-xl text-[#ccff00] font-black outline-none focus:border-[#ccff00] uppercase text-center" 
                        placeholder="Ex: FASTING 8 HOURS">
                    <button onclick="pushMsg()" id="pBtn" 
                        class="bg-blue-600 text-white font-black px-8 py-4 rounded-2xl uppercase tracking-widest text-xs active:scale-95 shadow-lg">
                        Push to Sender
                    </button>
                </div>
                <p id="sText" class="text-center mt-3 text-zinc-700 font-bold text-[8px] uppercase tracking-widest italic">Ready to link</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyDVIQ4S-w4Ag40uYuArW3o7Hw2XQwoQV7U",
            databaseURL: "https://montcode-e02c7-default-rtdb.firebaseio.com",
            projectId: "montcode-e02c7"
        };
        const app = initializeApp(config);
        const db = getDatabase(app);
        let activeID = null, bpC, gluC, currentRef = null;

        window.addPatient = () => {
            const id = prompt("ID:"), name = prompt("NAME:");
            if(id && name) {
                const d = JSON.parse(localStorage.getItem('sent_d') || '{}');
                d[id] = { name };
                localStorage.setItem('sent_d', JSON.stringify(d));
                render();
            }
        };

        function render() {
            const d = JSON.parse(localStorage.getItem('sent_d') || '{}');
            const cont = document.getElementById('p-list');
            cont.innerHTML = "";
            Object.keys(d).forEach(id => {
                const el = document.createElement('div');
                el.className = `p-3 rounded-xl border ${id === activeID ? 'border-[#ccff00] bg-zinc-800' : 'border-zinc-800'} cursor-pointer mb-2`;
                el.innerHTML = `<p class="text-[10px] font-black uppercase text-blue-400">${d[id].name}</p><p class="text-[7px] text-zinc-500">ID: ${id}</p>`;
                el.onclick = () => selectP(id);
                cont.appendChild(el);
            });
        }

        window.selectP = (id) => {
            if(currentRef) off(currentRef);
            activeID = id;
            document.getElementById('mInput').value = ""; // LIMPIEZA TOTAL AL CAMBIAR
            render();
            sync(id);
        };

        function sync(id) {
            currentRef = ref(db, `pacientes/${id}/telemetria`);
            onValue(currentRef, (s) => {
                const data = s.val();
                if(!data) { reset(); return; }
                const logs = Object.values(data).sort((a,b) => b.time - a.time);
                update(logs);
            });
        }

        window.pushMsg = async () => {
            const val = document.getElementById('mInput').value;
            const st = document.getElementById('sText');
            if(!val || !activeID) return;
            
            try {
                // TRANSMITE AL RECEPTOR 'SENDER' POR ID
                await set(ref(db, `mensaje_dr/${activeID}`), { texto: val, time: Date.now() });
                st.innerText = "PUSH SUCCESSFUL TO SENDER: " + activeID;
                st.className = "text-[#ccff00] font-bold text-[8px] uppercase tracking-widest text-center mt-3";
                document.getElementById('mInput').value = ""; // LIMPIEZA TRAS ENVÍO
            } catch (e) { st.innerText = "LINK ERROR"; }
        };

        function update(logs) {
            const bp = logs.filter(l => l.type === "BP").slice(0,5).reverse();
            bpC.data.labels = bp.map(l => new Date(l.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
            bpC.data.datasets[0].data = bp.map(l => l.sys);
            bpC.update();

            const glu = logs.filter(l => l.type === "GLU").slice(0,5).reverse();
            gluC.data.labels = glu.map((_,i) => i+1);
            gluC.data.datasets[0].data = glu.map(l => l.val);
            gluC.update();
        }

        function reset() {
            bpC.data.datasets[0].data = []; bpC.update();
            gluC.data.datasets[0].data = []; gluC.update();
        }

        // INIT CHARTS
        const opt = { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#111'},ticks:{color:'#444',font:{size:7}}},x:{display:false}} };
        bpC = new Chart(document.getElementById('bpChart'), { type:'line', data:{labels:[], datasets:[{borderColor:'#ef4444', data:[], tension:0.4}]}, options:opt });
        gluC = new Chart(document.getElementById('gluChart'), { type:'bar', data:{labels:[], datasets:[{backgroundColor:'#ccff00', data:[], borderRadius:4}]}, options:opt });
        
        render();
    </script>
</body>
</html>
