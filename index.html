<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATION ONE - DIRECT LINK</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 flex flex-col items-center min-h-screen">
    <div class="w-full max-w-md mt-10">
        <h1 class="text-[#ccff00] text-3xl font-black italic mb-2 text-center uppercase">Station One</h1>
        <div class="bg-zinc-900 border-2 border-zinc-800 p-8 rounded-[2.5rem]">
            <input type="text" id="noteInput" class="w-full bg-black border-2 border-zinc-800 rounded-2xl p-5 text-[#ccff00] font-black mb-6 text-center" placeholder="EX: LOSARTAN">
            <button onclick="sendDirect()" id="sendBtn" class="w-full bg-blue-600 font-black py-5 rounded-2xl uppercase">Push Direct</button>
            <p id="status" class="mt-4 text-[9px] text-zinc-500 text-center uppercase italic">Status: Standby</p>
        </div>
    </div>

    <script>
        // ESTA ES LA LÓGICA DEL "HOLA MUNDO": Directo a Pusher
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2', authEndpoint: null });

        async function sendDirect() {
            const msg = document.getElementById('noteInput').value;
            const status = document.getElementById('status');
            if(!msg) return;

            status.innerText = "SENDING...";

            // Nota: Enviar directamente desde el cliente requiere que el canal sea "client-test"
            // o usar una pequeña función para no dar error de seguridad. 
            // Si el Hola Mundo de aquel día funcionó, es porque la ruta era simple.
            
            // Si prefieres usar la función de Vercel que ya tenemos:
            try {
                const res = await fetch('/api/relay', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg })
                });
                if(res.ok) {
                    status.innerText = "SENT SUCCESSFUL ✅";
                    document.getElementById('noteInput').value = "";
                } else { throw new Error(); }
            } catch(e) {
                status.innerText = "CONNECTION ERROR ❌";
            }
        }
    </script>
</body>
</html>
