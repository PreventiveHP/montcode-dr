 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATION ONE - DIRECT LINK</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans flex flex-col items-center min-h-screen">
    <div class="w-full max-w-md mt-10">
        <h1 class="text-[#ccff00] text-3xl font-black italic tracking-tighter uppercase mb-2 text-center text-glow">Station One</h1>
        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.4em] mb-8 text-center">Emergency Direct Link</p>

        <div class="bg-zinc-900 border-2 border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl">
            <label class="text-[10px] text-blue-400 font-black uppercase tracking-widest block mb-4 italic text-center">Instruction for Patient:</label>
            
            <input type="text" id="noteInput" 
                class="w-full bg-black border-2 border-zinc-800 rounded-2xl p-5 text-xl text-[#ccff00] font-black outline-none focus:border-[#ccff00] mb-6 uppercase text-center" 
                placeholder="Ex: LOSARTAN 50MG">

            <button onclick="transmitDirect()" id="sendBtn" 
                class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-sm active:scale-95 shadow-lg hover:bg-blue-500">
                Push to Patient
            </button>

            <div id="status-box" class="mt-6 text-center">
                <p id="status-text" class="text-zinc-700 font-bold text-[9px] uppercase tracking-widest italic">System: Ready</p>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Importamos las librerías necesarias de Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 2. Tu configuración personalizada de MontCode
        const firebaseConfig = {
            apiKey: "AIzaSyDVIQ4S-w4Ag40uYuArW3o7Hw2XQwoQV7U",
            authDomain: "montcode-e02c7.firebaseapp.com",
            databaseURL: "https://montcode-e02c7-default-rtdb.firebaseio.com",
            projectId: "montcode-e02c7",
            storageBucket: "montcode-e02c7.firebasestorage.app",
            messagingSenderId: "988300151844",
            appId: "1:988300151844:web:b1a31275a9555de98a9cb1"
        };

        // 3. Inicializamos la conexión
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 4. La función de envío arreglada
        async function transmitDirect() {
            const val = document.getElementById('noteInput').value;
            if(!val) return;
            
            const status = document.getElementById('status-text');
            const btn = document.getElementById('sendBtn');
            
            status.innerText = "LINKING TO CLOUD...";
            status.className = "text-yellow-500 font-bold text-[9px] animate-pulse uppercase tracking-widest italic";
            btn.disabled = true;

            try {
                // Escribimos directamente en Firebase
                // La ruta 'mensaje_dr' es donde el paciente escuchará
                await set(ref(db, 'mensaje_dr'), {
                    texto: val,
                    timestamp: Date.now(),
                    status: "sent"
                });

                status.innerText = "SENT SUCCESSFUL ✅";
                status.className = "text-[#ccff00] font-bold text-[9px] uppercase tracking-widest italic";
                document.getElementById('noteInput').value = "";
                
            } catch (e) {
                console.error("Error de Firebase:", e);
                status.innerText = "CLOUD ERROR ❌";
                status.className = "text-red-500 font-bold text-[9px] uppercase tracking-widest italic";
            } finally { 
                btn.disabled = false; 
            }
        }

        // Exponemos la función al botón del HTML
        window.transmitDirect = transmitDirect;
    </script>

    <style>
        .text-glow { text-shadow: 0 0 15px rgba(204, 255, 0, 0.3); }
    </style>
</body>
</html>
