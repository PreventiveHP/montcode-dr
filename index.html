<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTCODE PROVIDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans flex flex-col items-center min-h-screen">
    <div class="w-full max-w-md mt-10">
        <h1 class="text-[#ccff00] text-3xl font-black italic tracking-tighter uppercase mb-2 text-center">Station One</h1>
        <div class="bg-zinc-900 border-2 border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl">
            <label class="text-[10px] text-blue-400 font-black uppercase tracking-widest block mb-4 italic text-center">Instruction for Patient:</label>
            <input type="text" id="noteInput" class="w-full bg-black border-2 border-zinc-800 rounded-2xl p-5 text-xl text-[#ccff00] font-black outline-none focus:border-[#ccff00] mb-6 uppercase text-center" placeholder="Ex: LOSARTAN 50MG">
            <button onclick="transmitNote()" id="sendBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-sm active:scale-95">Push to Patient</button>
            <div id="status-box" class="mt-6 text-center">
                <p id="status-text" class="text-zinc-700 font-bold text-[9px] uppercase tracking-widest italic">Link: Standby</p>
            </div>
        </div>
    </div>

    <script>
        async function transmitNote() {
            const val = document.getElementById('noteInput').value;
            if(!val) return;
            const status = document.getElementById('status-text');
            const btn = document.getElementById('sendBtn');
            status.innerText = "TRANSMITTING...";
            btn.disabled = true;

            try {
                // LLAMADA A LA API (ESTO BUSCA LA CARPETA /API)
                const response = await fetch('/api/pusher-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });

                if (response.ok) {
                    status.innerText = "SENT SUCCESSFUL ✅";
                    document.getElementById('noteInput').value = "";
                } else { throw new Error(); }
            } catch (e) {
                status.innerText = "CONNECTION ERROR ❌";
            } finally { btn.disabled = false; }
        }
    </script>
</body>
</html>
